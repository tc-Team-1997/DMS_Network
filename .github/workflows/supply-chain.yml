name: Supply Chain (SBOM + Signing)

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write     # for cosign keyless signing via OIDC
  packages: write
  attestations: write

env:
  IMAGE: ghcr.io/${{ github.repository }}/dms-python

jobs:
  sbom-and-sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (with provenance + SBOM attestation)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: python-service
          push: true
          tags: ${{ env.IMAGE }}:${{ github.ref_name }}
          provenance: mode=max
          sbom: true

      # Install syft + cosign
      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.2.4

      - name: Generate SPDX SBOM
        run: |
          syft ${{ env.IMAGE }}:${{ github.ref_name }} -o spdx-json > sbom.spdx.json
          syft ${{ env.IMAGE }}:${{ github.ref_name }} -o cyclonedx-json > sbom.cdx.json

      - name: Keyless sign image (cosign)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: cosign sign --yes ${{ env.IMAGE }}:${{ github.ref_name }}

      - name: Attach SBOM as attestation
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson ${{ env.IMAGE }}:${{ github.ref_name }}
          cosign attest --yes --predicate sbom.cdx.json --type cyclonedx ${{ env.IMAGE }}:${{ github.ref_name }}

      - name: Vulnerability scan (grype, fail on High+)
        uses: anchore/scan-action@v3
        with:
          image: ${{ env.IMAGE }}:${{ github.ref_name }}
          fail-build: true
          severity-cutoff: high

      - name: Upload SBOMs as release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.ref_name }}
          path: |
            sbom.spdx.json
            sbom.cdx.json

      # SLSA Level 3 provenance (signed Sigstore attestation)
      - name: Generate SLSA provenance
        uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v1.10.0
        with:
          image: ${{ env.IMAGE }}
          digest: ${{ steps.build.outputs.digest }}
          registry-username: ${{ github.actor }}
        secrets:
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  verify-policy:
    needs: sbom-and-sign
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: sigstore/cosign-installer@v3
      # Blocks deploys if any of the required attestations are missing.
      - name: Verify signature + SBOM + SLSA provenance
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign verify ${{ env.IMAGE }}:${{ github.ref_name }} \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
          cosign verify-attestation ${{ env.IMAGE }}:${{ github.ref_name }} \
            --type spdxjson \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
