version: '3.8'

services:
  # Node.js Express app (port 3000)
  node:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nbe-dms-node
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://dms:demo123@postgres:5432/nbe_dms
      PYTHON_SERVICE_URL: http://python:8000
      PYTHON_SERVICE_KEY: dev-key-demo
      STORAGE_DIR: /app/uploads
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-super-secret-demo-key-change-in-prod}
      SESSION_SECRET: ${SESSION_SECRET:-session-secret-demo}
      API_KEY: dev-key-demo
    volumes:
      - ./uploads:/app/uploads
      - ./db:/app/db
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - dms-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Python FastAPI service (port 8000)
  python:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: nbe-dms-python
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://dms:demo123@postgres:5432/nbe_dms
      STORAGE_DIR: /app/storage
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      API_KEY: dev-key-demo
      JWT_SECRET: ${JWT_SECRET:-super-secret-demo-key-change-in-prod}
      AWS_REGION: eu-west-1
      ENVIRONMENT: ${ENVIRONMENT:-demo}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./python-service/storage:/app/storage
      - ./python-service/app:/app/app:ro
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - dms-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # PostgreSQL Database (replaces RDS for demo)
  postgres:
    image: postgres:15-alpine
    container_name: nbe-dms-postgres
    environment:
      POSTGRES_USER: dms
      POSTGRES_PASSWORD: demo123
      POSTGRES_DB: nbe_dms
      POSTGRES_INITDB_ARGS: >
        -c log_statement=all
        -c shared_preload_libraries=pg_trgm,pg_stat_statements
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    networks:
      - dms-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dms"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "max_connections=100"

  # Redis (sessions, caching, rate limiting)
  redis:
    image: redis:7-alpine
    container_name: nbe-dms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dms-network
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfilename "appendonly.aof"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Apache Kafka (event bus)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: nbe-dms-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_LOG4J_ROOT_LOGLEVEL: WARN
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - dms-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "echo", "stat", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: nbe-dms-kafka
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://127.0.0.1:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
      KAFKA_LOG_RETENTION_HOURS: 24
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - dms-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # (Optional) Adminer for DB inspection
  adminer:
    image: adminer:latest
    container_name: nbe-dms-adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - dms-network
    restart: unless-stopped

  # (Optional) Kafka UI for topic inspection
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: nbe-dms-kafka-ui
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - kafka
      - zookeeper
    networks:
      - dms-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  zookeeper_data:
    driver: local
  kafka_data:
    driver: local

networks:
  dms-network:
    driver: bridge
