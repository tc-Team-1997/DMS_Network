<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" role="img" aria-label="Bank of Bhutan logo placeholder">
  <!-- Brand background -->
  <rect width="120" height="120" rx="16" fill="#1B3A6B"/>

  <!-- Inner emblem ring -->
  <circle cx="60" cy="52" r="28" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-opacity="0.35"/>

  <!-- Stylised "B" mark -->
  <text
    x="60"
    y="64"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="36"
    font-weight="700"
    fill="#FFFFFF"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-1"
  >B</text>

  <!-- "BoB" wordmark -->
  <text
    x="60"
    y="97"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="11"
    font-weight="600"
    fill="#FFFFFF"
    fill-opacity="0.85"
    text-anchor="middle"
    letter-spacing="3"
  >BOB</text>
</svg>
