apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nbe-dms.fullname" . }}
  labels: {{- include "nbe-dms.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels: {app.kubernetes.io/name: {{ include "nbe-dms.name" . }}, app.kubernetes.io/instance: {{ .Release.Name }}}
  template:
    metadata:
      labels: {app.kubernetes.io/name: {{ include "nbe-dms.name" . }}, app.kubernetes.io/instance: {{ .Release.Name }}}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.port }}"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports: [{containerPort: {{ .Values.service.port }}}]
          env:
            {{- range $k, $v := .Values.env }}
            - {name: {{ $k }}, value: "{{ $v }}"}
            {{- end }}
          envFrom:
            - secretRef: {name: {{ include "nbe-dms.fullname" . }}-secrets}
          readinessProbe: {httpGet: {path: /health, port: {{ .Values.service.port }}}, initialDelaySeconds: 5, periodSeconds: 10}
          livenessProbe:  {httpGet: {path: /health, port: {{ .Values.service.port }}}, initialDelaySeconds: 20, periodSeconds: 30}
          resources: {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts: [{name: data, mountPath: /data}]
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: {{ include "nbe-dms.fullname" . }}-data}
      {{- end }}
