apiVersion: apps/v1
kind: Deployment
metadata:
  name: dms-python-worker
  namespace: nbe-dms
  labels: {app: dms-python-worker}
spec:
  replicas: 2
  selector:
    matchLabels: {app: dms-python-worker}
  template:
    metadata:
      labels: {app: dms-python-worker}
    spec:
      containers:
        - name: worker
          image: nbe/dms-python-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: {name: dms-python-config}
            - secretRef: {name: dms-python-secrets}
          env:
            - name: REDIS_URL
              value: "redis://redis.nbe-dms.svc:6379/0"
            - name: RQ_QUEUE
              value: "dms-default"
          resources:
            requests: {cpu: "200m", memory: "512Mi"}
            limits:   {cpu: "1",    memory: "2Gi"}
          volumeMounts:
            - {name: data, mountPath: /data}
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: dms-python-data}
