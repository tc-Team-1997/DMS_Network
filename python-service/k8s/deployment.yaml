apiVersion: apps/v1
kind: Deployment
metadata:
  name: dms-python
  namespace: nbe-dms
  labels:
    app: dms-python
spec:
  replicas: 2
  selector:
    matchLabels: {app: dms-python}
  template:
    metadata:
      labels: {app: dms-python}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: nbe/dms-python:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: {name: dms-python-config}
            - secretRef: {name: dms-python-secrets}
          readinessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests: {cpu: "200m", memory: "512Mi"}
            limits:   {cpu: "1",    memory: "2Gi"}
          volumeMounts:
            - {name: data, mountPath: /data}
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: dms-python-data}
