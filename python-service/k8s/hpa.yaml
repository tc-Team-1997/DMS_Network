apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dms-python
  namespace: nbe-dms
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dms-python
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: {type: Utilization, averageUtilization: 70}
